name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    env:
      TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Rodar lint
        run: npm run lint

      - name: Gerar build
        run: npm run build